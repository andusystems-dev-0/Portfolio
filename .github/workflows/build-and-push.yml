name: build-and-push

# Build the SvelteKit static site into the nginx-unprivileged image, push it
# to the in-house Nexus Docker registry on the storage cluster, then bump
# the image tag in the andusystems-portfolio IaC repo on Forgejo. Management
# ArgoCD watches that repo and rolls the portfolio Deployment once the bump
# commit syncs — full GitOps, no kubectl from the runner.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # One build per ref. Newer pushes cancel older in-flight builds so we don't
  # race two pushes of :latest pointing at different commits.
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.andusystems.com
  IMAGE: andusystems-docker/portfolio

jobs:
  build-and-push:
    # Org-level gha-runner-scale-set in the management cluster (arc-runners
    # namespace, see andusystems-management/apps/github-runner). DinD enabled,
    # so the docker CLI inside the runner container talks to a sidecar daemon.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${REGISTRY}/${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${REGISTRY}/${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to Nexus registry
        # Credentials belong to the `ci-pusher` Nexus user (role
        # `andusystems-ci-pusher`, scoped to the andusystems-docker hosted
        # repo). Created per andusystems-storage/apps/nexus/README.md step 5.
        # Set NEXUS_USERNAME and NEXUS_PASSWORD as repository or org secrets.
        run: |
          echo "${NEXUS_PASSWORD}" | docker login "${REGISTRY}" \
            --username "${NEXUS_USERNAME}" \
            --password-stdin
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build image
        run: |
          docker build \
            --tag "${{ steps.tags.outputs.image_sha }}" \
            --tag "${{ steps.tags.outputs.image_latest }}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.tags.outputs.image_sha }}"
          docker push "${{ steps.tags.outputs.image_latest }}"

      - name: Bump image tag in andusystems-portfolio (GitOps)
        # Updates apps/portfolio/manifest.yml in the IaC repo on Forgejo to
        # the immutable :<short-sha> tag we just pushed. Management ArgoCD
        # syncs the portfolio Application from this repo, so the rollout
        # happens automatically once the commit lands. Sentinel takes care
        # of mirroring the resulting commit out to GitHub.
        env:
          FORGEJO_USER: ${{ secrets.FORGEJO_USER }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
          IMAGE_SHA: ${{ steps.tags.outputs.image_sha }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Use the cluster-internal Forgejo URL — the runner pod is on the
          # management cluster (same cluster as Forgejo), so this resolves
          # via in-cluster DNS without going through Pangolin/public DNS.
          # The public URL (forgejo.andusystems.com) routes through the
          # Pangolin overlay (100.x.x.x), which the management pod network
          # has no path to, AND its TLS chain isn't trusted by the runner
          # pod's git/curl. The internal URL is plain HTTP — Forgejo accepts
          # basic auth credentials over HTTP for git protocol just fine,
          # and the traffic never leaves the cluster.
          REPO_URL="http://${FORGEJO_USER}:${FORGEJO_TOKEN}@forgejo-http.forgejo.svc.cluster.local:3000/andusystems/andusystems-portfolio.git"
          WORKDIR="$(mktemp -d)"

          # Shallow clone is fine — we only need to edit one file and push one
          # commit. Use --filter to keep it small in case the repo grows.
          git clone --depth 1 --branch main "${REPO_URL}" "${WORKDIR}"
          cd "${WORKDIR}"

          git config user.name  "portfolio-ci"
          git config user.email "ci@andusystems.com"

          MANIFEST="apps/portfolio/manifest.yml"

          # Replace whatever tag is currently on the portfolio image line —
          # whether it's :latest (first run) or a previous :<sha> — with the
          # short SHA from this build. The regex anchors on the full image
          # path so we don't accidentally rewrite some other image reference.
          sed -i -E \
            "s|(registry\.andusystems\.com/andusystems-docker/portfolio):[^\"[:space:]]+|\1:${SHORT_SHA}|g" \
            "${MANIFEST}"

          if git diff --quiet -- "${MANIFEST}"; then
            echo "manifest already pinned to ${SHORT_SHA}, nothing to commit"
            exit 0
          fi

          git add "${MANIFEST}"
          git commit \
            -m "chore(portfolio): bump image to ${SHORT_SHA}" \
            -m "Source: Portfolio@${SOURCE_SHA}" \
            -m "Image:  ${IMAGE_SHA}" \
            -m "Auto-generated by .github/workflows/build-and-push.yml on the self-hosted runner. ArgoCD will roll the portfolio Deployment once this commit syncs."

          # Retry with rebase in case another commit landed on main between
          # our clone and our push (e.g. a parallel image bump from another
          # branch, or a hand-edit). Three attempts is plenty for a repo
          # this quiet.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "pushed on attempt ${attempt}"
              exit 0
            fi
            echo "push attempt ${attempt} failed, rebasing on origin/main..."
            git pull --rebase origin main
          done

          echo "failed to push manifest bump after 3 attempts"
          exit 1

      - name: Logout
        if: always()
        run: docker logout "${REGISTRY}" || true
